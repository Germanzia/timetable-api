<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <title>ورود | سیستم مدیریت زمانبندی</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tahoma', 'Vazir', sans-serif;
            background: linear-gradient(135deg, #303841 0%, #1a1f24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: #F5F5F5;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
            width: 350px;
        }
        h1 {
            text-align: center;
            color: #303841;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #303841;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #76ABAE 0%, #5a8a8d 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); }
        .error {
            color: #FF5722;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 ورود به سیستم</h1>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>نام کاربری</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>رمز عبور</label>
                <input type="password" name="password" required>
            </div>
            {% if form.errors %}
            <div class="error">نام کاربری یا رمز عبور اشتباه است</div>
            {% endif %}
            <button type="submit">ورود</button>
        </form>
    </div>
</body>
</html>
