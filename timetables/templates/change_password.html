<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تغییر رمز عبور | سیستم مدیریت زمانبندی</title>

    {% load static %}

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazir', 'BMitra', 'BYekan', 'Tahoma', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #303841 0%, #1a1f24 100%);
            min-height: 100vh;
            padding: 30px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 40%, rgba(118, 171, 174, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        @font-face {
            font-family: 'Vazir';
            src: url('{% static "fonts/persian/Vazir.ttf" %}') format('truetype');
            font-weight: normal;
        }

        @font-face {
            font-family: 'Vazir';
            src: url('{% static "fonts/persian/Vazir-Bold.ttf" %}') format('truetype');
            font-weight: bold;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #F5F5F5;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #303841 0%, #76ABAE 100%);
            color: #F5F5F5;
            padding: 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 87, 34, 0.15) 0%, transparent 70%);
            animation: gentleDrift 12s ease-in-out infinite;
        }

        @keyframes gentleDrift {
            0%, 100% { transform: translate(0, 0); opacity: 0.3; }
            50% { transform: translate(3%, 3%); opacity: 0.6; }
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
            position: relative;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            opacity: 0.85;
            position: relative;
            font-size: 13px;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #303841;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s ease;
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: #76ABAE;
            box-shadow: 0 0 0 3px rgba(118, 171, 174, 0.2);
        }

        .form-group input.error {
            border-color: #FF5722;
        }

        .error-message {
            color: #FF5722;
            font-size: 11px;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            background: #4CAF50;
            color: white;
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn-save, .btn-cancel {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            border: none;
            transition: all 0.2s ease;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .btn-save {
            background: linear-gradient(135deg, #76ABAE 0%, #5a8a8d 100%);
            color: white;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(118, 171, 174, 0.4);
        }

        .btn-cancel {
            background: linear-gradient(135deg, #FF5722 0%, #e04e1e 100%);
            color: white;
        }

        .btn-cancel:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 87, 34, 0.4);
        }

        .user-info {
            background: #76ABAE;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
            color: #F5F5F5;
            border-bottom: 1px solid rgba(48, 56, 65, 0.1);
        }

        .user-info a {
            color: #F5F5F5;
            text-decoration: none;
            background: rgba(48, 56, 65, 0.3);
            padding: 5px 12px;
            border-radius: 20px;
            transition: all 0.2s ease;
        }

        .user-info a:hover {
            background: rgba(48, 56, 65, 0.5);
        }

        .footer {
            padding: 16px;
            text-align: center;
            background: #303841;
            color: #76ABAE;
            font-size: 12px;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🔐 تغییر رمز عبور</h1>
            <p>رمز عبور خود را وارد کنید</p>
        </div>

        <div class="user-info">
            <span>👤 {{ user_name|default:"کاربر" }}</span>
            <a href="/api/performance-table-fa/">← بازگشت به جدول</a>
        </div>

        <div class="content">
            <div id="successMessage" class="success-message"></div>

            <form id="passwordForm">
                <div class="form-group">
                    <label>رمز عبور فعلی</label>
                    <input type="password" id="oldPassword" name="old_password" required>
                    <div id="oldPasswordError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label>رمز عبور جدید</label>
                    <input type="password" id="newPassword" name="new_password" required>
                    <div id="newPasswordError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label>تکرار رمز عبور جدید</label>
                    <input type="password" id="confirmPassword" name="confirm_password" required>
                    <div id="confirmPasswordError" class="error-message"></div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-save">💾 تغییر رمز عبور</button>
                    <a href="/api/performance-table-fa/" class="btn-cancel">❌ انصراف</a>
                </div>
            </form>
        </div>

        <div class="footer">
            <p>© ۱۴۰۵ سیستم زمانبندی کارکنان</p>
        </div>
    </div>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function showMessage(elementId, message, isSuccess = false) {
            const element = document.getElementById(elementId);
            if (isSuccess) {
                element.style.display = 'block';
                element.innerText = message;
                setTimeout(() => {
                    element.style.display = 'none';
                }, 3000);
            } else {
                element.style.display = 'block';
                element.innerText = message;
            }
        }

        function hideError(fieldId) {
            const errorDiv = document.getElementById(fieldId + 'Error');
            errorDiv.style.display = 'none';
            const input = document.getElementById(fieldId);
            input.classList.remove('error');
        }

        function showError(fieldId, message) {
            const errorDiv = document.getElementById(fieldId + 'Error');
            errorDiv.innerText = message;
            errorDiv.style.display = 'block';
            const input = document.getElementById(fieldId);
            input.classList.add('error');
        }

        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Clear previous errors
            ['oldPassword', 'newPassword', 'confirmPassword'].forEach(field => {
                hideError(field);
            });
            document.getElementById('successMessage').style.display = 'none';

            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            let hasError = false;

            if (!oldPassword) {
                showError('oldPassword', 'رمز عبور فعلی را وارد کنید');
                hasError = true;
            }

            if (!newPassword) {
                showError('newPassword', 'رمز عبور جدید را وارد کنید');
                hasError = true;
            } else if (newPassword.length < 4) {
                showError('newPassword', 'رمز عبور جدید باید حداقل ۴ کاراکتر باشد');
                hasError = true;
            }

            if (!confirmPassword) {
                showError('confirmPassword', 'تکرار رمز عبور را وارد کنید');
                hasError = true;
            } else if (newPassword !== confirmPassword) {
                showError('confirmPassword', 'رمز عبور جدید و تکرار آن مطابقت ندارند');
                hasError = true;
            }

            if (hasError) return;

            try {
                // FIXED: Changed from '/api/change-password/' to '/api/change-password-api/'
                const response = await fetch('/api/change-password-api/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({
                        old_password: oldPassword,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('successMessage', '✓ رمز عبور با موفقیت تغییر یافت', true);
                    document.getElementById('passwordForm').reset();
                    setTimeout(() => {
                        window.location.href = '/api/performance-table-fa/';
                    }, 2000);
                } else {
                    if (data.error === 'Wrong password') {
                        showError('oldPassword', 'رمز عبور فعلی اشتباه است');
                    } else {
                        showError('oldPassword', data.error || 'خطا در تغییر رمز عبور');
                    }
                }
            } catch (error) {
                showError('oldPassword', 'خطا در ارتباط با سرور');
            }
        });

        // Remove error on input
        ['oldPassword', 'newPassword', 'confirmPassword'].forEach(field => {
            document.getElementById(field).addEventListener('input', () => hideError(field));
        });
    </script>
</body>
</html>
